# https://gohugo.io/getting-started/configuration/
baseURL = "https://education.launchcode.org/gis-devops"
languageCode = "en-us"
title = "LaunchCode Technical Training: GIS-DevOps"
theme = ["learn"] 

[outputs]
# HTML: site
# RSS: feed data
# JSON: search indexing
home = [ "HTML", "RSS", "JSON"]

[params]
# Change default color scheme with a variant one. Can be "red", "blue", "green".
themeVariant = "blue"
custom_css = ["css/technical-training.css"]
disableInlineCopyToClipBoard = true